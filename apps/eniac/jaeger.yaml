---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jaegertracing
  namespace: monitoring
spec:
  interval: 1h
  url: https://jaegertracing.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jaeger
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: jaeger
      version: "4.6.x"
      sourceRef:
        kind: HelmRepository
        name: jaegertracing
        namespace: monitoring
      interval: 1h
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: jaeger
            patch: |
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: badger-data
                  persistentVolumeClaim:
                    claimName: jaeger-badger-data
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: badger-data
                  mountPath: /badger/data
  values:
    jaeger:
      ingress:
        enabled: true
        ingressClassName: traefik
        pathType: Prefix
        path: /jaeger
        hosts:
          - monitoring.home.gawbul.io
        tls:
          - secretName: monitoring-tls
            hosts:
              - monitoring.home.gawbul.io
    esIndexCleaner:
      enabled: false
    esRollover:
      enabled: false
    esLookback:
      enabled: false
    extraObjects:
      - apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: jaeger-badger-data
          namespace: monitoring
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 8Gi
    userconfig:
      extensions:
        healthcheckv2:
          use_v2: true
          http: {}
        jaeger_storage:
          backends:
            primary_store:
              badger:
                directories:
                  keys: /badger/data/keys
                  values: /badger/data/values
                maintenance_interval: 5m
        jaeger_query:
          base_path: /jaeger
          storage:
            traces: primary_store
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      processors:
        batch: {}
      exporters:
        jaeger_storage_exporter:
          trace_storage: primary_store
      service:
        extensions:
          - healthcheckv2
          - jaeger_storage
          - jaeger_query
        pipelines:
          traces:
            receivers:
              - otlp
            processors:
              - batch
            exporters:
              - jaeger_storage_exporter
        telemetry:
          metrics:
            level: detailed
            readers:
              - pull:
                  exporter:
                    prometheus:
                      host: 0.0.0.0
                      port: 8888
