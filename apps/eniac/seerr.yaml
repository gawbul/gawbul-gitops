---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: seerr
  namespace: media
spec:
  interval: 1h
  type: oci
  url: oci://ghcr.io/seerr-team/seerr
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      chart: seerr-chart
      version: 3.2.0
      sourceRef:
        kind: HelmRepository
        name: seerr
        namespace: media
  values:
    extraEnv:
      - name: TZ
        value: Europe/London
      - name: LOG_LEVEL
        value: info
    podAnnotations:
      reloader.stakater.com/auto: "true"
    podSecurityContext:
      runAsUser: 1024
      runAsGroup: 101
      fsGroup: 101
      fsGroupChangePolicy: "OnRootMismatch"
    service:
      port: 5055
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
      hosts:
        - host: seerr.home.gawbul.io
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - secretName: seerr-tls
          hosts:
            - seerr.home.gawbul.io
    config:
      persistence:
        size: 5Gi
        storageClass: local-path
        accessModes:
          - ReadWriteOnce
